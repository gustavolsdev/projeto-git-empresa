name: Deploy Docker

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Build Docker
        run: docker build -t meu-site .

      - name: Teste simples
        run: echo "Deploy funcionando 🚀"
